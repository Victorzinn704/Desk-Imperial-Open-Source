name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_ENV: test
  TZ: America/Sao_Paulo
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:4000
  DATABASE_URL: postgresql://desk_imperial_ci:desk_imperial_ci_password@localhost:5432/partner_portal_test
  COOKIE_SECRET: ci-only-cookie-secret-not-used-in-production-32c
  CSRF_SECRET: ci-only-csrf-secret-not-used-in-production-32ch!
  ENCRYPTION_KEY: ci-only-encryption-key-not-used-in-prod-32c
  SESSION_TTL_HOURS: '24'
  PASSWORD_RESET_TTL_MINUTES: '30'
  CONSENT_VERSION: '2026.03'
  ENABLE_SWAGGER: 'false'

jobs:
  quality:
    name: Quality (Lint + Typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native bindings for web toolchain
        run: node ./scripts/install-ci-native-bindings.mjs

      - name: Generate Prisma client
        run: npm --workspace @partner/api run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CI native bindings
        run: node ./scripts/install-ci-native-bindings.mjs

      - name: Generate Prisma client
        run: npm --workspace @partner/api run prisma:generate

      - name: Run API tests
        run: npm --workspace @partner/api run test -- --coverage --ci --forceExit

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-${{ github.sha }}
          path: apps/api/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 14

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native bindings for web toolchain
        run: node ./scripts/install-ci-native-bindings.mjs

      - name: Run web unit tests
        run: npm --workspace @partner/web run test

  frontend-e2e:
    name: Frontend E2E (Chromium Baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native bindings for web toolchain
        run: node ./scripts/install-ci-native-bindings.mjs

      - name: Install Playwright Chromium
        run: npm --workspace @partner/web exec playwright install --with-deps chromium

      - name: Run web e2e baseline
        run: npm --workspace @partner/web run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-artifacts-${{ github.sha }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Public repo safety scan
        run: npm run repo:scan-public

      - name: Dependency Review (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
          comment-summary-in-pr: always

      - name: Runtime security audit
        run: npm run security:audit-runtime

  performance-latency-gate:
    name: Performance Latency Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, backend-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: partner_portal_test
          POSTGRES_USER: desk_imperial_ci
          POSTGRES_PASSWORD: desk_imperial_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U desk_imperial_ci -d partner_portal_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://desk_imperial_ci:desk_imperial_ci_password@localhost:5432/partner_portal_test
      DIRECT_URL: postgresql://desk_imperial_ci:desk_imperial_ci_password@localhost:5432/partner_portal_test
      REDIS_URL: redis://localhost:6379
      COOKIE_SECRET: ci-only-cookie-secret-not-used-in-production-32c
      CSRF_SECRET: ci-only-csrf-secret-not-used-in-production-32ch!
      ENCRYPTION_KEY: ci-only-encryption-key-not-used-in-prod-32c
      ENABLE_SWAGGER: 'false'
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Prepare API database schema
        run: |
          npm --workspace @partner/api run prisma:generate
          npm --workspace @partner/api run prisma:migrate:deploy

      - name: Build API
        run: npm --workspace @partner/api run build

      - name: Start API in background
        run: |
          nohup npm --workspace @partner/api run start > api-latency-gate.log 2>&1 &
          echo $! > api-latency-gate.pid

      - name: Wait for API health
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:4000/api/health > /tmp/api-health.json; then
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 2
          done

          echo "API nao respondeu a tempo no health endpoint."
          cat api-latency-gate.log || true
          exit 1

      - name: Run latency gate (k6)
        run: npm run test:load:ci
        env:
          BASE_URL: http://127.0.0.1:4000

      - name: Upload latency gate artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latency-gate-debug-${{ github.sha }}
          path: api-latency-gate.log
          retention-days: 3

      - name: Stop API background process
        if: always()
        run: |
          if [ -f api-latency-gate.pid ]; then
            kill "$(cat api-latency-gate.pid)" || true
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, backend-tests, frontend-unit, frontend-e2e, security, performance-latency-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm --workspace @partner/api run prisma:generate

      - name: Build all workspaces
        run: npm run build

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-${{ github.sha }}
          path: |
            apps/api/dist/
            apps/web/.next/server/
          retention-days: 3
