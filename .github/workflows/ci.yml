name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/partner_portal
      COOKIE_SECRET: ci-cookie-secret
      CSRF_SECRET: ci-csrf-secret
      ENCRYPTION_KEY: ci-encryption-key
      SESSION_TTL_HOURS: 24
      PASSWORD_RESET_TTL_MINUTES: 30
      CONSENT_VERSION: 2026.03
      ENABLE_SWAGGER: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm --workspace @partner/api run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
