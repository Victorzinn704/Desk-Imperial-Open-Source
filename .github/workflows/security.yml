name: Security Scan Semanal

on:
  schedule:
    - cron: "0 6 * * 1" # Segunda-feira às 6h UTC (3h BRT)
  workflow_dispatch: # Permite execução manual

permissions:
  contents: read
  security-events: write

jobs:
  # ── Trivy — scan completo (incluindo CVEs de severidade MEDIUM) ───────────────
  trivy-full:
    name: Trivy Full Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem completo
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-full.sarif
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          skip-dirs: node_modules,dist,.next,coverage,infra

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-full.sarif
          category: trivy-weekly

  # ── OSV-Scanner — dependências e lockfile ─────────────────────────────────────
  osv-scanner:
    name: OSV-Scanner Full
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: OSV-Scanner — lockfile + recursive
        run: |
          docker pull ghcr.io/google/osv-scanner:latest
          docker run --rm -v "${PWD}:/src" ghcr.io/google/osv-scanner:latest \
            scan source --recursive /src -L /src/package-lock.json --verbosity warn
        continue-on-error: true

  # ── Gitleaks — histórico completo do repositório ──────────────────────────────
  gitleaks-history:
    name: Gitleaks Full History
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Semgrep — scan completo com regras atualizadas ────────────────────────────
  semgrep-full:
    name: Semgrep Full Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep — config auto + regras custom
        run: |
          semgrep scan \
            --config .semgrep/desk-imperial.yml \
            --config auto \
            --sarif-output semgrep-weekly.sarif \
            apps/api/src apps/web/app apps/web/components packages/types/src
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-weekly.sarif
          category: semgrep-weekly

  # ── Notificação de resumo ──────────────────────────────────────────────────────
  notify:
    name: Sumário de Segurança
    runs-on: ubuntu-latest
    needs: [trivy-full, osv-scanner, gitleaks-history, semgrep-full]
    if: always()
    steps:
      - name: Resultado do scan semanal
        run: |
          echo "## Resultado do Scan de Segurança Semanal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Full | ${{ needs.trivy-full.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV-Scanner | ${{ needs.osv-scanner.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks History | ${{ needs.gitleaks-history.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep Full | ${{ needs.semgrep-full.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resultados detalhados em: Security > Code scanning alerts" >> $GITHUB_STEP_SUMMARY
