name: Dependency Review

# Analisa todas as dependências adicionadas/atualizadas em um Pull Request
# e bloqueia o merge se encontrar vulnerabilidades conhecidas (CVE).
# Funciona com o grafo de dependências do GitHub (ativado por padrão em repos públicos).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Bloqueia dependências com severidade HIGH ou CRITICAL
          fail-on-severity: high
          # Permite licenças comuns de open source
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
          # Comenta no PR com o resumo das vulnerabilidades encontradas
          comment-summary-in-pr: always
