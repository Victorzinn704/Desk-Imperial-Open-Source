name: Detect GitHub code scanning availability
description: Detecta se o repositório aceita upload de SARIF no GitHub Code Scanning.

outputs:
  enabled:
    description: 'true quando code scanning está habilitado e acessível'
    value: ${{ steps.detect.outputs.enabled }}

runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        response_file="$(mktemp)"
        status="$(
          curl -sS -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o "${response_file}" \
            -w "%{http_code}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1"
        )"

        if [ "${status}" = "200" ]; then
          echo "enabled=true" >> "${GITHUB_OUTPUT}"
          rm -f "${response_file}"
          exit 0
        fi

        echo "enabled=false" >> "${GITHUB_OUTPUT}"

        if grep -qi "code scanning is not enabled" "${response_file}"; then
          echo "::notice::GitHub code scanning is not enabled for ${GITHUB_REPOSITORY}. SARIF upload will be skipped."
        else
          echo "::warning::Unable to verify GitHub code scanning availability for ${GITHUB_REPOSITORY} (HTTP ${status}). SARIF upload will be skipped."
        fi

        rm -f "${response_file}"
