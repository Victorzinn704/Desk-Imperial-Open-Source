name: Setup Node workspace
description: Padroniza setup do Node, install de dependências e passos opcionais de toolchain para o monorepo.

inputs:
  node-version:
    description: Versão do Node.js usada no job
    required: false
    default: '22'
  install-native-bindings:
    description: Instala bindings nativos do toolchain web no Linux
    required: false
    default: 'false'
  generate-prisma:
    description: Gera o Prisma Client para jobs que tocam a API
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      env:
        HUSKY: 0
        NPM_CONFIG_AUDIT: false
        NPM_CONFIG_FUND: false
        NPM_CONFIG_FETCH_RETRIES: 5
        NPM_CONFIG_FETCH_RETRY_FACTOR: 2
        NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 1000
        NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 30000
      run: |
        for attempt in 1 2 3; do
          if npm ci; then
            exit 0
          fi

          if [ "$attempt" -lt 3 ]; then
            echo "npm ci falhou na tentativa $attempt; limpando cache verificado e repetindo."
            npm cache verify || true
            sleep $((attempt * 5))
          fi
        done

        echo "npm ci falhou apos 3 tentativas."
        exit 1

    - name: Install CI native bindings
      if: ${{ inputs.install-native-bindings == 'true' }}
      shell: bash
      run: node ./scripts/install-ci-native-bindings.mjs

    - name: Generate Prisma client
      if: ${{ inputs.generate-prisma == 'true' }}
      shell: bash
      run: npm --workspace @partner/api run prisma:generate
