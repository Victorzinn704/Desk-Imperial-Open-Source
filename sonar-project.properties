sonar.projectKey=desk-imperial
sonar.projectName=Desk Imperial
sonar.sourceEncoding=UTF-8

# SonarQube Community nao entrega monorepo nativo por modulo.
# Neste repo, a estrategia local suportada e um unico projeto agregando API + Web.
sonar.sources=apps/api/src,apps/web/app,apps/web/components,apps/web/lib,apps/web/hooks,apps/web/providers,packages/types/src
sonar.tests=apps/api/test,apps/web/app,apps/web/components
sonar.test.inclusions=apps/api/test/**/*.ts,apps/api/src/**/*.spec.ts,apps/web/**/*.test.ts,apps/web/**/*.test.tsx,apps/web/**/*.spec.ts,apps/web/**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/.cache/**,**/*.d.ts,apps/api/prisma/migrations/**,apps/api/prisma/schema.prisma,apps/web/e2e/**,apps/web/test/**,apps/web/public/**
sonar.coverage.exclusions=apps/api/src/main.ts,apps/web/vitest.config.ts,apps/web/playwright.config.ts,apps/web/next.config.ts
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.typescript.tsconfigPaths=apps/api/tsconfig.json,apps/web/tsconfig.json,tsconfig.base.json
sonar.qualitygate.wait=true
