sonar.projectKey=desk-imperial
sonar.projectName=Desk Imperial
sonar.sourceEncoding=UTF-8

sonar.sources=apps/api/src,apps/web,packages/types/src
sonar.tests=apps/api/test,apps/web

sonar.test.inclusions=apps/api/test/**/*.ts,apps/web/**/*.test.ts,apps/web/**/*.test.tsx,apps/web/**/*.spec.ts,apps/web/**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/*.d.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,apps/web/e2e/**,apps/web/test/**,apps/web/public/**,infra/**,docs/**
sonar.coverage.exclusions=apps/web/vitest.config.ts

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.qualitygate.wait=true
