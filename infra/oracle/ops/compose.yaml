name: desk-imperial-ops

services:
  alloy:
    image: grafana/alloy:v1.8.3
    container_name: desk-ops-alloy
    command: ['run', '--server.http.listen-addr=0.0.0.0:12345', '/etc/alloy/config.alloy']
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - '${OPS_PRIVATE_IP:-127.0.0.1}:4317:4317'
      - '${OPS_PRIVATE_IP:-127.0.0.1}:4318:4318'
      - '127.0.0.1:12345:12345'
      - '127.0.0.1:12347:12347'
    depends_on:
      - loki
      - prometheus
      - tempo
    restart: unless-stopped

  blackbox:
    image: prom/blackbox-exporter:v0.26.0
    container_name: desk-ops-blackbox
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - '127.0.0.1:9115:9115'
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.8.2
    container_name: desk-ops-tempo
    command: ['-config.file=/etc/tempo/tempo.yaml']
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - '127.0.0.1:3200:3200'
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: desk-ops-loki
    command: ['-config.file=/etc/loki/config.yaml']
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - '127.0.0.1:3100:3100'
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: desk-ops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-3GB}'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '127.0.0.1:9090:9090'
    depends_on:
      - alertmanager
      - blackbox
      - node-exporter
    restart: unless-stopped

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: desk-ops-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  prod-node-exporter-proxy:
    image: alpine:3.20
    container_name: desk-ops-prod-node-exporter-proxy
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssh-client >/dev/null
        exec ssh -N -T \
          -o ExitOnForwardFailure=yes \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=3 \
          -o StrictHostKeyChecking=accept-new \
          -i /run/secrets/prod_node_exporter_tunnel \
          -L 0.0.0.0:19100:127.0.0.1:9100 \
          ubuntu@10.10.1.221
    volumes:
      - ./ssh/prod-node-exporter-tunnel:/run/secrets/prod_node_exporter_tunnel:ro
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: desk-ops-alertmanager
    environment:
      ALERTMANAGER_ENV: ${ALERTMANAGER_ENV:-development}
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
    entrypoint:
      - '/bin/sh'
      - '/etc/alertmanager/render-config.sh'
    volumes:
      - ./alertmanager/render-config.sh:/etc/alertmanager/render-config.sh:ro
      - alertmanager-data:/alertmanager
    ports:
      - '127.0.0.1:9093:9093'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:12.0.1
    container_name: desk-ops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-desk_observability_admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_METRICS_ENABLED: 'true'
      GF_USERS_DEFAULT_THEME: dark
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
    volumes:
      - ./grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '127.0.0.1:3001:3000'
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  sonar-db:
    image: postgres:16-alpine
    container_name: desk-ops-sonar-db
    environment:
      POSTGRES_USER: ${SONAR_JDBC_USERNAME:-sonarqube}
      POSTGRES_PASSWORD: ${SONAR_JDBC_PASSWORD}
      POSTGRES_DB: sonarqube
    volumes:
      - sonar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: desk-ops-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME:-sonarqube}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD}
      SONAR_WEB_JAVAOPTS: ${SONAR_WEB_JAVAOPTS:--Xms256m -Xmx768m}
      SONAR_CE_JAVAOPTS: ${SONAR_CE_JAVAOPTS:--Xms256m -Xmx768m}
      SONAR_SEARCH_JAVAOPTS: ${SONAR_SEARCH_JAVAOPTS:--Xms768m -Xmx768m -XX:MaxDirectMemorySize=256m}
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 8192
        hard: 8192
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    ports:
      - '127.0.0.1:9000:9000'
    restart: unless-stopped

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  sonar-postgres-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
