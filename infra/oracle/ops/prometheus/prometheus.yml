global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: alloy
    static_configs:
      - targets: ['alloy:12345']

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']

  - job_name: oracle-node-exporter
    static_configs:
      - targets:
          - '10.10.1.166:9100'
        labels:
          oracle_vm: vm-free-02
          role: ops-builder
      - targets:
          - '10.10.1.221:9100'
        labels:
          oracle_vm: vm-free-01
          role: production

  - job_name: desk-api-health
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: ['https://api.deskimperial.online/api/health']
    static_configs:
      - targets: ['blackbox:9115']
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__address__]
        target_label: __tmp_blackbox_instance
        replacement: blackbox:9115
      - source_labels: [__tmp_blackbox_instance]
        target_label: __address__

  - job_name: desk-app-health
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: ['https://app.deskimperial.online/']
    static_configs:
      - targets: ['blackbox:9115']
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__address__]
        target_label: __tmp_blackbox_instance
        replacement: blackbox:9115
      - source_labels: [__tmp_blackbox_instance]
        target_label: __address__

  - job_name: sonarqube-health
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: ['http://sonarqube:9000/api/system/status']
    static_configs:
      - targets: ['blackbox:9115']
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__address__]
        target_label: __tmp_blackbox_instance
        replacement: blackbox:9115
      - source_labels: [__tmp_blackbox_instance]
        target_label: __address__

  - job_name: blackbox
    static_configs:
      - targets: ['blackbox:9115']
