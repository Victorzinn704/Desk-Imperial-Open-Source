name: desk-imperial-oracle

services:
  redis:
    image: redis:7.4-alpine
    command:
      - sh
      - -lc
      - exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --save 60 1 --save 300 10 --maxmemory 512mb --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - runtime
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: desk-imperial-oracle-api:local
    build:
      context: ../..
      dockerfile: infra/oracle/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - runtime
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:4000/api/v1/health >/dev/null']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    image: desk-imperial-oracle-web:local
    build:
      context: ../..
      dockerfile: infra/oracle/docker/web.Dockerfile
      args:
        APP_URL: ${APP_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - runtime
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:3000/ >/dev/null']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - runtime

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -lc 'trap exit TERM; while :; do certbot renew --webroot --webroot-path /var/www/certbot; sleep 12h & wait $${!}; done'
    restart: unless-stopped
    networks:
      - runtime

volumes:
  redis-data:
  certbot-www:
  certbot-certs:

networks:
  runtime:
    driver: bridge
