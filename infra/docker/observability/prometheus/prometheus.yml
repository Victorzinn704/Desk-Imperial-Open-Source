global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: alloy
    static_configs:
      - targets: ['alloy:12345']

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']

  # Probe HTTP real da API sem exigir endpoint em formato Prometheus.
  - job_name: desk-api-health
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: [http://host.docker.internal:4000/api/v1/health]
    static_configs:
      - targets: ['blackbox:9115']
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__address__]
        target_label: __tmp_blackbox_instance
        replacement: blackbox:9115
      - source_labels: [__tmp_blackbox_instance]
        target_label: __address__

  # Auto-monitoramento do blackbox exporter.
  - job_name: blackbox
    static_configs:
      - targets: ['blackbox:9115']
